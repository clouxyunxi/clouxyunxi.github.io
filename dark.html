    <script>
        /*

        function updateTime() {
            var startTime = new Date(2026, 1, 13, 6, 8, 16);
            var now = new Date();
            var diff = now.getTime() - startTime.getTime();
            
            if (diff < 0) {
                document.getElementById('current-time').innerHTML = '计算错误';
                return;
            }
            
            var seconds = Math.floor(diff / 1000);
            var minutes = Math.floor(seconds / 60);
            var hours = Math.floor(minutes / 60);
            var days = Math.floor(hours / 24);
            var months = Math.floor(days / 30);
            var years = Math.floor(months / 12);
            
            months = months % 12;
            days = days % 30;
            hours = hours % 24;
            minutes = minutes % 60;
            seconds = seconds % 60;
            
            document.getElementById('current-time').innerHTML = years + '年' + months + '月' + days + '日' + hours + '时' + minutes + '分' + seconds + '秒';
        }
        
        function showModal() {
            event.preventDefault();
            document.getElementById('modal').style.display = 'block';
        }
        
        function closeModal() {
            document.getElementById('modal').style.display = 'none';
        }
        
        document.addEventListener('DOMContentLoaded', function() {
            updateTime();
            setInterval(updateTime, 1000);
        });
